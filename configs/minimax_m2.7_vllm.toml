# MiniMax-M2.7 (MoE) — vLLM dual-phase config for 4× RTX PRO 6000 96GB
# 256 experts (8 routed), 62 layers, hidden=3072, expert_dim=1536
# FP8: ~230GB weights → TP=4 → ~58GB/GPU, ~30GB headroom for KV cache + LoRA
#
# Target hardware: 4× NVIDIA RTX PRO 6000 Blackwell (96GB GDDR7, PCIe Gen5 only,
# NO NVLink). vLLM ≥ 0.19 required.
#
# Architecture: vLLM TP for BOTH phases — all 4 GPUs compute simultaneously.
#   Phase 1: vllm_hidden_states.extract_hidden_states_vllm uses vLLM's native
#     MiniMaxM2ForCausalLM (which inherits SupportsEagle3) + PR #33736's
#     extract_hidden_states speculative method. No HF pipeline-parallel fallback,
#     so no "1 GPU busy, 3 idle" pathology.
#   Phase 2: vLLM TP generation with LoRA hot-swap + MoE router suppression
#     via collective_rpc (vllm_moe_editor.VLLMMoEEditor).
#
# TP must divide num_kv_heads=8. Valid: 1, 2, 4, 8. TP=4 is the sweet spot here.
#
# NOTE: MoE expert-weight ablation (EGA on fused experts) is NOT supported in
# vLLM mode — only router suppression + LoRA weight steering. That is sufficient
# for refusal abliteration on MoE per the Qwen3.5-122B / gpt-oss-20b playbooks.

[model]
model_id = "MiniMaxAI/MiniMax-M2.7"
dtype_fallback_order = ["auto"]
quant_method = "fp8"
# MiniMax requires transformers 4.57.x (custom code for HF-path fallback only —
# vLLM loads its own native MiniMaxM2ForCausalLM regardless). Keep
# skip_fp8_dequant=true so the HF path (if ever triggered) doesn't do a slow
# bf16 dequant workaround on pods where that check misfires.
skip_fp8_dequant = true
attn_implementation = "flash_attention_2"
use_torch_compile = false
device_map = "auto"
# trust_remote_code is required by HF AutoTokenizer & AutoConfig (MiniMax ships
# custom tokenizer/config code). vLLM's model registry maps MiniMaxM2ForCausalLM
# to its native class, so this flag does NOT cause MiniMax's modeling_*.py to be
# loaded in vLLM.
trust_remote_code = true
# max_memory only matters if Phase 1 falls back to HF PP. The fast path (vLLM
# extract_hidden_states) ignores this and uses gpu_memory_utilization instead.
max_memory = {0 = "90GiB", 1 = "90GiB", 2 = "90GiB", 3 = "90GiB"}

# ─── vLLM backend (both phases) ──────────────────────────────────────────────
backend = "vllm"
tensor_parallel_size = 4
# RTX PRO 6000 has 96GB GDDR7. Model weights ~58GB/GPU, KV+LoRA+CUDA graphs need
# ~12-15GB, leaving ~20GB slack. 0.92 is the safe ceiling — pushing 0.96 risks
# OOM during the FP8→warmup phase on Blackwell.
gpu_memory_utilization = 0.92
# Expert parallel DISABLED on purpose for RTX PRO 6000:
#   • EP distributes 256 experts across GPUs (64 per rank) but requires an
#     all-to-all token dispatch on every MoE layer.
#   • All-to-all over PCIe Gen5 (no NVLink) has ~10× the latency of NVLink
#     equivalents and serializes poorly.
#   • With TP only, experts are column/row-sharded by the FusedMoE kernel.
#     Each rank holds a 1/4 slice of every expert, dispatched via all-reduce
#     instead of all-to-all. Memory cost is the same; comm pattern is cheaper.
# On 4× H100 NVLink we'd flip this back to true.
enable_expert_parallel = false
# Chunked prefill overlaps prefill/decode for better GPU utilization.
enable_chunked_prefill = true
# CUDA graphs for ~15% throughput boost (stable with vLLM ≥ 0.8).
# NOTE: vllm_hidden_states.py internally forces enforce_eager=True for the
# Phase 1 extraction pass (safer with the speculative proposer). Phase 2
# generation honors this setting.
enforce_eager = false
# FP8 KV cache: Blackwell has native FP8 tensor cores. Halves KV memory,
# near-zero quality loss for refusal-detection-length generations.
kv_cache_dtype = "fp8_e4m3"
# CRITICAL: cap sequence length. Model supports 196K, but our prompts + gen are
# < 2K. Default would reserve 196K KV per sequence, killing batch size.
# 4096 → ~48× more KV cache slots → ~48× larger batches.
max_model_len = 4096
# Continuous batching ceiling. 128 is a conservative setting for PCIe TP=4 —
# higher values amplify all-reduce overhead on each step. 400-prompt trials
# finish in ≤4 scheduler waves at this cap.
max_num_seqs = 128

[inference]
batch_size = 0
# Abliterix auto-tuner ceiling. Matches max_num_seqs so the vLLM scheduler
# can absorb the whole benign/target set in few waves.
max_batch_size = 128
# Refusal detection only needs ~30-50 tokens; cap at 64 to halve gen cost.
max_gen_tokens = 64

[steering]
# V2 recipe validated on Gemma 4 26B-A4B (128 experts); same path scales to
# MiniMax-M2.7's 256-expert 62-layer stack.
steering_mode = "direct"
vector_method = "mean"
n_directions = 1
orthogonal_projection = true
projected_abliteration = true
winsorize_vectors = true
winsorize_quantile = 0.995
discriminative_layer_selection = true
decay_kernel = "gaussian"
# MiniMax is standard pre-norm (not Gemma-4 double-norm) — no row-norm
# preservation required, which also avoids an extra pass over 15.8k expert
# weight blocks per trial.
weight_normalization = "none"
# MoE: wider weight range (consistent with Qwen3.5-122B/397B).
strength_range = [1.0, 10.0]
# Q/K/V steering adds 12 search dimensions for near-zero improvement on MoE.
# Validated on Gemma 4 E4B (21 dims → 9 dims, TPE converges properly).
disabled_components = ["attn.q_proj", "attn.k_proj", "attn.v_proj"]
# Focus search: EGA on expert down_proj (wide) + attention output (moderate).
[steering.component_strength_ranges]
"mlp.down_proj" = [2.0, 10.0]
"attn.o_proj" = [1.0, 5.0]

[optimization]
num_trials = 50
num_warmup_trials = 10
checkpoint_dir = "checkpoints_minimax_m27_vllm"

[kl]
scale = 1.0
token_count = 3
# Tighten target so KL is a real signal, not a vacuous constraint
# (matches Gemma-4 V5).
target = 0.008
# Prune over-steered trials early (skip compliance check if KL > threshold).
# Each trial on 229B MoE is expensive — prune aggressively.
prune_threshold = 2.0

[detection]
llm_judge = true
llm_judge_model = "google/gemini-3.1-flash-lite-preview"
llm_judge_batch_size = 10
llm_judge_concurrency = 35

[display]
print_responses = false
print_residual_geometry = false
plot_residuals = false

non_interactive = true

# Public datasets so the pod doesn't need a scp of `datasets/` (and we avoid
# the M2.5 sed-patch dance on a fresh pod).
[benign_prompts]
dataset = "mlabonne/harmless_alpaca"
split = "train[:400]"
column = "text"

[target_prompts]
dataset = "mlabonne/harmful_behaviors"
split = "train[:400]"
column = "text"

[benign_eval_prompts]
dataset = "mlabonne/harmless_alpaca"
split = "train[400:500]"
column = "text"

[target_eval_prompts]
dataset = "mlabonne/harmful_behaviors"
split = "train[400:500]"
column = "text"
