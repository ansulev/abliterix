non_interactive = true

# GPT-OSS-20B (MoE) steering config — RTX 6000 Ada 48GB
# Architecture: 24 layers, 32 routed experts, top-4, no shared experts
# hidden=2880, intermediate=2880, fused expert weights (mlp.experts.down_proj)
# Ships as MXFP4 (~13GB) — abliteration must dequant to BF16 (~40GB).
#
# GPU notes (RTX 6000 Ada, sm_89):
#   - vLLM FA3 unavailable on Ada; falls back to FA2 automatically.
#   - BF16 model + KV cache + hidden states cache must fit in 48GB.
#   - max_memory pinned to 44GiB to leave headroom for activations/KV.
#   - Keep max_batch_size small; bottleneck is activation memory, not flops.
#
# MXFP4 handling (auto, do not override):
#   - engine.py auto-detects native MXFP4 and forces
#     `Mxfp4Config(dequantize=True)` so GptOssExperts.down_proj is exposed
#     as a standard 3-D nn.Parameter (32, 2880, 2880). Without dequant,
#     the experts are wrapped in Mxfp4GptOssExperts whose weights are
#     packed triton tensors that abliterix cannot edit.
#   - DO NOT install `kernels-community/gpt-oss-triton-kernels`; it is
#     unnecessary for the dequant path and only adds load time.
#   - Keep `quant_method = "none"` here — engine sees the model's own
#     quantization_config and forces the right Mxfp4Config.
#
# Steering strategy:
#   - steering_mode = "direct" → orthogonal projection on base weights
#     AND auto-triggers Expert-Granular Abliteration (EGA) on all 32
#     experts' fused down_proj (steering.py:244). Critical for MoE because
#     the refusal signal is distributed across experts, not concentrated.
#   - EGA axis fix: gpt-oss stores fused down_proj as
#     (experts, intermediate_in, hidden_out) — transposed vs standard MoE.
#     engine.py sets `_fused_down_proj_transposed=True` for gpt_oss so
#     _apply_ega_steering picks the correct projection branch (the
#     dimension equality 2880==2880 made shape-based detection ambiguous).
#   - weight_normalization = "full" → preserve row norms after projection
#     (matches Gemma 4 best practice for direct mode).

[model]
model_id = "openai/gpt-oss-20b"
dtype_fallback_order = ["bfloat16"]
quant_method = "none"
use_torch_compile = false
device_map = "auto"
trust_remote_code = true
max_memory = {0 = "92GiB"}

[inference]
batch_size = 0          # auto-tune
max_batch_size = 8      # RTX PRO 6000 96GB has plenty of room (~50GB headroom)
max_gen_tokens = 150

[steering]
vector_method = "mean"
steering_mode = "direct"        # in-place weight edit + EGA on fused experts
decay_kernel = "linear"
orthogonal_projection = true
weight_normalization = "full"   # norm-preserving projection (Gemma 4 lesson)
# Strength range tuned to v1 trial 1 (28/100) winning fingerprint.
# Default range applies to attention components. Attention winners had
# max_weight in [1.99, 6.69], so [1, 7] covers all of them with no waste
# in the over-steer region (>7 consistently produced 100/100 in v3).
strength_range = [1.0, 7.0]

# min_weight cap — derived from v1 trial 1 winning fingerprint.
# All v1 winner attn components had min_frac < 0.34, EGA had min_frac
# = 0.02. Without caps, uniform random in [0, 1] gives E[min_frac] = 0.5
# → nearly-flat strength profile → over-steer. With these caps, random
# sampling concentrates on "sharp peak" profiles like the v1 winner.
min_weight_frac_max = 0.4

# mlp.down_proj (EGA on fused experts) wants HIGH strength — v1 winner
# had max=8.62, and the productive region appears to be 6-11. Override
# the global range only for this component.
[steering.component_strength_ranges]
"mlp.down_proj" = [6.0, 11.0]

[steering.component_min_frac_max]
"mlp.down_proj" = 0.10

# Search budget — bumped warmup to 25 because the EGA-on landscape is jagged
# (small region of "low refusal" surrounded by over-steer cliffs). TPE needs
# more random samples to model the joint distribution well. v1 trial 1 was
# the 1st warmup hit; we want more chances at similar lucky samples plus
# strong TPE refinement after.
# v6: v5 shipped but refusal not fully zero on edge prompts.  Two additions
# target the remaining refusal:
#   1. [experts] block — enables router suppression in addition to EGA.
#      EGA alone modifies experts; router suppression also *redirects away*
#      from safety experts, a complementary mechanism.
#   2. Bumped num_trials 50→100, warmup 25→40 — EGA + router is a 5-D
#      search space, TPE needs ~40 random samples to model the joint.
#
# NOT using iterative: iterative_abliterate returns a rank-N subspace tensor
# (all passes' directions concatenated), not per-layer vectors — incompatible
# with EGA's per-layer indexing (steering.py:699 does vectors[layer_idx+1]).
# Iterative belongs to a future experiment where we disable EGA.
[optimization]
num_trials = 100
num_warmup_trials = 40
checkpoint_dir = "checkpoints_gpt_oss_20b_v6b"

# Router suppression search bounds.  gpt-oss-20b has 32 experts × 24 layers.
# max_suppress=6 = suppress top-6 safety experts per layer (19% of experts).
# router_bias_range=[-10, 0] gives full range from no-op (0) to total
# exclusion (-10 → scale=0).
[experts]
max_suppress = 6
router_bias_range = [-10.0, 0.0]
ablation_weight_range = [0.0, 0.0]  # pinned off — EGA handles expert weights

[kl]
scale = 1.0
token_count = 3
target = 0.01
prune_threshold = 5.0

[detection]
llm_judge = true
llm_judge_model = "google/gemini-3.1-flash-lite-preview"
llm_judge_batch_size = 10
llm_judge_concurrency = 6

[display]
print_responses = false
print_residual_geometry = false
plot_residuals = false

non_interactive = true

[benign_prompts]
dataset = "datasets/good_500"
split = "train[:400]"
column = "prompt"

[target_prompts]
dataset = "datasets/harmful_500"
split = "train[:400]"
column = "prompt"

[benign_eval_prompts]
dataset = "datasets/good_500"
split = "train[400:]"
column = "prompt"

[target_eval_prompts]
dataset = "datasets/harmful_500"
split = "train[400:]"
column = "prompt"
